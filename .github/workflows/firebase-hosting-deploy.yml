name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: List build output
        run: ls -la dist/
        
      # DEBUG STEP: verifies the secret is present and shows its project_id
      - name: Debug: check Firebase service-account project_id
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MADRIDINSIDER }}
        run: |
          # Install jq if it's not present, then print project_id from the JSON secret.
          # The project_id is safe to display for verification; secrets themselves remain masked.
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
          echo "project_id from secret:"
          echo "$SA_JSON" | jq -r .project_id
          
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MADRIDINSIDER }}
          channelId: live
          projectId: madridinsider
